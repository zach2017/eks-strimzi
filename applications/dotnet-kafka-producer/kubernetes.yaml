apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-kafka-producer
  namespace: kafka
  labels:
    app: dotnet-kafka-producer
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dotnet-kafka-producer
  template:
    metadata:
      labels:
        app: dotnet-kafka-producer
        version: v1
    spec:
      containers:
      - name: dotnet-kafka-producer
        image: dotnet-kafka-producer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-kafka-producer
  namespace: kafka
  labels:
    app: dotnet-kafka-producer
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 5000
    targetPort: http
    protocol: TCP
  selector:
    app: dotnet-kafka-producer
